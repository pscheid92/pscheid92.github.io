<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <rect width="960" height="440" fill="#1e1e2e"/>

  <!-- LEFT SIDE: Independent -->
  <text x="190" y="45" font-family="Virgil, Segoe UI Emoji, serif" font-size="24" fill="#fb7185" text-anchor="middle">Independent Signatures</text>

  <rect x="120" y="80" width="140" height="50" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="190" y="112" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">file_hash</text>

  <!-- Fork arrows -->
  <line x1="155" y1="140" x2="110" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>
  <line x1="225" y1="140" x2="270" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <rect x="35" y="200" width="150" height="50" rx="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="110" y="232" font-family="Virgil, Segoe UI Emoji, serif" font-size="16" fill="#fbbf24" text-anchor="middle">Ed25519</text>

  <rect x="200" y="200" width="150" height="50" rx="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <text x="275" y="232" font-family="Virgil, Segoe UI Emoji, serif" font-size="16" fill="#c084fc" text-anchor="middle">ML-DSA-65</text>

  <text x="190" y="295" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#fb7185" opacity="0.7" text-anchor="middle">Attacker breaks Ed25519,</text>
  <text x="190" y="315" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#fb7185" opacity="0.7" text-anchor="middle">forges new ed25519_sig.</text>
  <text x="190" y="335" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#fb7185" opacity="0.7" text-anchor="middle">ML-DSA-65 sig still valid!</text>

  <text x="190" y="390" font-family="Virgil, Segoe UI Emoji, serif" font-size="22" fill="#fb7185" text-anchor="middle" font-weight="bold">WEAK</text>

  <!-- Divider -->
  <line x1="430" y1="20" x2="430" y2="420" stroke="#6b7280" stroke-width="1" opacity="0.3" stroke-dasharray="8,6"/>

  <!-- RIGHT SIDE: Nested -->
  <text x="680" y="45" font-family="Virgil, Segoe UI Emoji, serif" font-size="24" fill="#34d399" text-anchor="middle">Nested Signatures</text>

  <rect x="610" y="80" width="140" height="50" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="680" y="112" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">file_hash</text>

  <line x1="680" y1="140" x2="680" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <rect x="610" y="190" width="140" height="50" rx="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="680" y="222" font-family="Virgil, Segoe UI Emoji, serif" font-size="16" fill="#fbbf24" text-anchor="middle">Ed25519</text>

  <line x1="680" y1="250" x2="680" y2="295" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="700" y="278" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#fbbf24" opacity="0.5">feeds into</text>

  <rect x="610" y="300" width="140" height="50" rx="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <text x="680" y="332" font-family="Virgil, Segoe UI Emoji, serif" font-size="16" fill="#c084fc" text-anchor="middle">ML-DSA-65</text>

  <text x="830" y="215" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#34d399" opacity="0.7">Attacker breaks Ed25519,</text>
  <text x="830" y="235" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#34d399" opacity="0.7">forges new ed25519_sig.</text>
  <text x="830" y="255" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#34d399" opacity="0.7">But ML-DSA-65 signed the</text>
  <text x="830" y="275" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#34d399" opacity="0.7">original -- mismatch!</text>

  <text x="680" y="395" font-family="Virgil, Segoe UI Emoji, serif" font-size="22" fill="#34d399" text-anchor="middle" font-weight="bold">SECURE</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>