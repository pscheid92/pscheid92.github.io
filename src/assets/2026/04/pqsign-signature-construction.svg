<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" width="1100" height="430">
  <rect width="1100" height="430" fill="#1e1e2e"/>
  <text x="440" y="45" font-family="Virgil, Segoe UI Emoji, serif" font-size="28" fill="#e2e8f0" opacity="0.8" text-anchor="middle">Nested Signature Construction</text>

  <!-- File -->
  <rect x="50" y="120" width="140" height="60" rx="8" fill="none" stroke="#6b7280" stroke-width="2"/>
  <text x="120" y="157" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#6b7280" text-anchor="middle">File</text>

  <!-- Arrow file to blake -->
  <line x1="200" y1="150" x2="260" y2="150" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- BLAKE2b -->
  <rect x="270" y="110" width="180" height="80" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="360" y="145" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#38bdf8" text-anchor="middle">BLAKE2b-512</text>
  <text x="360" y="172" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.5" text-anchor="middle">64-byte hash</text>

  <!-- Arrow blake to ed25519 -->
  <line x1="460" y1="150" x2="520" y2="150" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="490" y="140" font-family="monospace" font-size="12" fill="#6b7280" opacity="0.6" text-anchor="middle">file_hash</text>

  <!-- Ed25519 -->
  <rect x="530" y="110" width="200" height="80" rx="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="630" y="140" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#fbbf24" text-anchor="middle">Ed25519 Sign</text>
  <text x="630" y="162" font-family="monospace" font-size="12" fill="#fbbf24" opacity="0.5" text-anchor="middle">prefix || hash || comment</text>
  <text x="630" y="180" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#fbbf24" opacity="0.5" text-anchor="middle">64 bytes</text>

  <!-- Arrow ed25519 down to ML-DSA -->
  <line x1="630" y1="200" x2="630" y2="260" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="655" y="235" font-family="monospace" font-size="12" fill="#fbbf24" opacity="0.6">ed25519_sig</text>

  <!-- Arrow hash down to ML-DSA -->
  <polyline points="360,200 360,300 530,300" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.6" marker-end="url(#arrow-blue)"/>
  <text x="375" y="250" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.5">file_hash</text>

  <!-- ML-DSA-65 -->
  <rect x="540" y="270" width="220" height="80" rx="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <text x="650" y="300" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#c084fc" text-anchor="middle">ML-DSA-65 Sign</text>
  <text x="650" y="322" font-family="monospace" font-size="12" fill="#c084fc" opacity="0.5" text-anchor="middle">hash || ed25519_sig</text>
  <text x="650" y="340" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#c084fc" opacity="0.5" text-anchor="middle">3309 bytes</text>

  <!-- Arrow ed25519 to sig file -->
  <line x1="740" y1="150" x2="830" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Arrow ML-DSA to sig file -->
  <line x1="770" y1="310" x2="830" y2="290" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Signature file -->
  <rect x="840" y="185" width="200" height="150" rx="8" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="940" y="212" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#34d399" text-anchor="middle">.pqsig file</text>
  <text x="860" y="240" font-family="monospace" font-size="13" fill="#34d399" opacity="0.5">Header        (14 B)</text>
  <text x="860" y="260" font-family="monospace" font-size="13" fill="#34d399" opacity="0.5">ed25519_sig   (64 B)</text>
  <text x="860" y="280" font-family="monospace" font-size="13" fill="#34d399" opacity="0.5">mldsa65_sig (3309 B)</text>
  <text x="860" y="300" font-family="monospace" font-size="13" fill="#34d399" opacity="0.5">trusted_comment</text>

  <!-- Nesting note -->
  <text x="650" y="395" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#c084fc" opacity="0.4" text-anchor="middle">ML-DSA-65 commits to the Ed25519 signature</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>