<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 430" width="1150" height="430">
  <rect width="1150" height="430" fill="#1e1e2e"/>
  <text x="500" y="40" font-family="Virgil, Segoe UI Emoji, serif" font-size="28" fill="#e2e8f0" opacity="0.8" text-anchor="middle">Secret Key Encryption</text>

  <!-- Password -->
  <rect x="50" y="100" width="160" height="60" rx="8" fill="none" stroke="#fb7185" stroke-width="2"/>
  <text x="130" y="137" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#fb7185" text-anchor="middle">Password</text>

  <!-- Salt -->
  <rect x="80" y="210" width="100" height="40" rx="6" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.8"/>
  <text x="130" y="236" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#6b7280" opacity="0.8" text-anchor="middle">Salt (16 B)</text>

  <!-- Arrow password to argon -->
  <line x1="220" y1="130" x2="300" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#a-gray)"/>

  <!-- Arrow salt to argon -->
  <line x1="185" y1="220" x2="300" y2="155" stroke="#6b7280" stroke-width="1" opacity="0.6" marker-end="url(#a-gray)"/>

  <!-- Argon2id -->
  <rect x="310" y="90" width="220" height="80" rx="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="420" y="122" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#fbbf24" text-anchor="middle">Argon2id</text>
  <text x="420" y="150" font-family="monospace" font-size="14" fill="#fbbf24" opacity="0.5" text-anchor="middle">256 MiB . 3 iter . 1 lane</text>

  <!-- Time label -->
  <text x="420" y="205" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#fbbf24" opacity="0.4" text-anchor="middle">~378 ms per derivation</text>

  <!-- Arrow argon to chacha -->
  <line x1="540" y1="130" x2="610" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#a-gray)"/>
  <text x="575" y="118" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#6b7280" opacity="0.6" text-anchor="middle">256-bit key</text>

  <!-- XChaCha20-Poly1305 -->
  <rect x="620" y="90" width="260" height="80" rx="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <text x="750" y="122" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#c084fc" text-anchor="middle">XChaCha20-Poly1305</text>
  <text x="750" y="150" font-family="monospace" font-size="14" fill="#c084fc" opacity="0.5" text-anchor="middle">AEAD . 24-byte nonce</text>

  <!-- Nonce -->
  <rect x="680" y="210" width="120" height="40" rx="6" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.8"/>
  <text x="740" y="236" font-family="Virgil, Segoe UI Emoji, serif" font-size="14" fill="#6b7280" opacity="0.8" text-anchor="middle">Nonce (24 B)</text>
  <line x1="740" y1="210" x2="740" y2="178" stroke="#6b7280" stroke-width="1" opacity="0.6" marker-end="url(#a-gray)"/>

  <!-- Plaintext payload -->
  <rect x="620" y="290" width="260" height="120" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <text x="750" y="318" font-family="Virgil, Segoe UI Emoji, serif" font-size="16" fill="#38bdf8" text-anchor="middle">Plaintext Payload</text>
  <text x="645" y="345" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.6">Ed25519 SK       (32 B)</text>
  <text x="645" y="365" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.6">ML-DSA-65 SK   (2544 B)</text>
  <text x="645" y="385" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.6">Key ID              (8 B)</text>

  <!-- Arrow plaintext to chacha -->
  <line x1="750" y1="285" x2="750" y2="178" stroke="#38bdf8" stroke-width="2" opacity="0.6" marker-end="url(#a-blue)"/>

  <!-- Arrow chacha to key file -->
  <line x1="890" y1="130" x2="960" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#a-gray)"/>

  <!-- Key file -->
  <rect x="970" y="90" width="160" height="80" rx="8" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="1050" y="125" font-family="Virgil, Segoe UI Emoji, serif" font-size="20" fill="#34d399" text-anchor="middle">.key file</text>
  <text x="1050" y="152" font-family="Virgil, Segoe UI Emoji, serif" font-size="12" fill="#34d399" opacity="0.5" text-anchor="middle">encrypted binary</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>